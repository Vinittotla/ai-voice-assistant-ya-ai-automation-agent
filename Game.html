<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Air Shooter Game</title>
<style>
body{
margin:0;
overflow:hidden;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
}
canvas{
background:linear-gradient(#4fc3f7,#87ceeb,#ffffff);
border:3px solid black;
}
</style>
</head>
<body>

<canvas id="game" width="500" height="700"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let score=0;
let gameOver=false;

const player={
x:220,
y:620,
w:60,
h:60,
speed:6
};

const bullets=[];
const enemies=[];

const keys={};

document.addEventListener("keydown",e=>{
keys[e.key]=true;

if(e.key===" " && !gameOver){
bullets.push({
x:player.x+28,
y:player.y,
w:5,
h:15
});
}

if(gameOver && e.key.toLowerCase()=="r"){
location.reload();
}

});

document.addEventListener("keyup",e=>{
keys[e.key]=false;
});

function spawnEnemy(){

enemies.push({
x:Math.random()*440,
y:-60,
w:50,
h:50,
speed:2+Math.random()*3
});

}

setInterval(()=>{
if(!gameOver)spawnEnemy();
},800);

function update(){

if(gameOver)return;

if(keys["ArrowLeft"]||keys["a"])
player.x-=player.speed;

if(keys["ArrowRight"]||keys["d"])
player.x+=player.speed;

player.x=Math.max(0,Math.min(canvas.width-player.w,player.x));

for(let i=bullets.length-1;i>=0;i--){
bullets[i].y-=8;

if(bullets[i].y<0)
bullets.splice(i,1);
}

for(let i=enemies.length-1;i>=0;i--){

enemies[i].y+=enemies[i].speed;

if(enemies[i].y>canvas.height){
enemies.splice(i,1);
continue;
}

if(
player.x<enemies[i].x+enemies[i].w &&
player.x+player.w>enemies[i].x &&
player.y<enemies[i].y+enemies[i].h &&
player.y+player.h>enemies[i].y
){
gameOver=true;
}

for(let j=bullets.length-1;j>=0;j--){

if(
bullets[j].x<enemies[i].x+enemies[i].w &&
bullets[j].x+bullets[j].w>enemies[i].x &&
bullets[j].y<enemies[i].y+enemies[i].h &&
bullets[j].y+bullets[j].h>enemies[i].y
){

bullets.splice(j,1);
enemies.splice(i,1);
score++;
break;

}

}

}

}

function drawPlayer(){

ctx.fillStyle="blue";

ctx.beginPath();

ctx.moveTo(player.x+30,player.y);
ctx.lineTo(player.x,player.y+60);
ctx.lineTo(player.x+60,player.y+60);

ctx.closePath();

ctx.fill();

}

function drawBullets(){

ctx.fillStyle="yellow";

bullets.forEach(b=>{
ctx.fillRect(b.x,b.y,b.w,b.h);
});

}

function drawEnemies(){

ctx.fillStyle="red";

enemies.forEach(e=>{

ctx.beginPath();

ctx.arc(e.x+25,e.y+25,25,0,Math.PI*2);

ctx.fill();

});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

drawPlayer();

drawBullets();

drawEnemies();

ctx.fillStyle="black";
ctx.font="24px Arial";
ctx.fillText("Score: "+score,20,40);

if(gameOver){

ctx.fillStyle="rgba(0,0,0,0.6)";
ctx.fillRect(0,0,500,700);

ctx.fillStyle="white";
ctx.font="40px Arial";
ctx.fillText("GAME OVER",110,300);

ctx.font="24px Arial";
ctx.fillText("Score: "+score,190,350);

ctx.fillText("Press R to Restart",130,420);

}

}

function loop(){

update();

draw();

requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
